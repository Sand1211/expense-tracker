<!DOCTYPE html>
<html lang="en">

<head>

	<meta charset="UTF-8">

	<meta name="viewport" content="width=device-width,
                   initial-scale=1.0">

	<title>
		Register
	</title>

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

	<div class="container mt-5">

		<div class="row justify-content-center">

			<div class="col-md-4">

				<div class="card p-5 shadow-lg border-0 rounded-4">

					<div class="text-center mb-4">

						<h3 class="fw-bold text-primary">

							Create Account

						</h3>

						<p class="text-secondary small mb-0">

							Start tracking your daily expenses securely.

						</p>

					</div>

					<form id="registerForm">

					    <div class="mb-3">
					        <label class="form-label">Name</label>
					        <input type="text" id="name" class="form-control" required>
					    </div>

					    <div class="mb-3">
					        <label class="form-label">Username</label>
					        <input type="text" id="username" class="form-control" required>
					    </div>

					    <div class="mb-3">
					        <label for="password" class="form-label">Password</label>

							<input
							    type="password"
							    id="password"
							    class="form-control">

							<input
							    type="checkbox"
							    onclick="togglePassword()">
							Show Password

					    </div>

					    <!-- ✅ IMAGE UPLOAD ADDED HERE -->
					    <div class="mb-3">
					        <label class="form-label">Profile Image (Optional)</label>
					        <input type="file" id="image" class="form-control" accept="image/*">
					    </div>

					    <button type="submit" class="btn btn-primary w-100">
					        Register
					    </button>

					</form>

					<div class="text-center mt-3">

						<span class="text-muted">

							Already have an account?

						</span>

						<a href="/login.html" class="text-decoration-none fw-bold">

							Login here

						</a>

					</div>

				</div>

			</div>

		</div>

	</div>

	<script>

		document.getElementById(
			'registerForm'
		).addEventListener(
			'submit',
			async function (e) {

				e.preventDefault();
				
				
				const pass =
				    document.getElementById(
				        "password"
				    ).value;

				const passwordRegex =
				    /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&]).{6,}$/;

				if (!passwordRegex.test(pass)) {

				    alert(
				      "Password must contain minimum 6 characters, one uppercase, one lowercase, one number and one special character."
				    );

				    return;
				}

				const registerRequest = {
				    name: document.getElementById('name').value,
				    username: document.getElementById('username').value,
				    password: pass
				};

				// create FormData
				const formData = new FormData();

				formData.append(
				    "data",
				    new Blob(
				        [JSON.stringify(registerRequest)],
				        { type: "application/json" }
				    )
				);

				// file input (make sure your input id is correct)
				const fileInput = document.getElementById("image");

				if (fileInput?.files?.length > 0) {
				    formData.append("image", fileInput.files[0]);
				}

				// fetch call
				const response = await fetch('/auth/register', {
				    method: 'POST',
				    body: formData
				});

				let data;

				try {
				    data = await response.json();
				} catch (e) {
				    const text = await response.text();
				    alert(text || "Unexpected server error");
				    return;
				}

				if (!response.ok) {
				    alert(data.message || "Registration failed");
				    return;
				}

				alert(data.message);
				window.location.href = '/login.html';
			});
			
			function togglePassword() {

			    const password =
			        document.getElementById(
			            "password"
			        );

			    password.type =
			        password.type === "password"
			            ? "text"
			            : "password";
			}

	</script>

</body>

</html>
