<!DOCTYPE html>
<html lang="en">

<head>

	<meta charset="UTF-8">

	<meta name="viewport" content="width=device-width,
                   initial-scale=1.0">

	<title>Personal Expense Tracker</title>

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

	<div class="container mt-5">

		<div class="row justify-content-center">

			<div class="col-md-4">

				<div class="card p-5 shadow-lg border-0 rounded-4">

					<div class="text-center mb-4">

						<h3 class="fw-bold text-primary">

							Personal Expense Tracker

						</h3>

						<p class="text-secondary small mb-0">

							Track your daily spending,
							manage expenses,
							and monitor your financial habits.

						</p>

					</div>





					<form id="loginForm">

						<div class="mb-3">

							<label class="form-label">
								Username
							</label>

							<input type="text" id="username" class="form-control" required>

						</div>

						<div class="mb-3">

							<label class="form-label">
								Password
							</label>

							<input type="password" id="password" class="form-control" required>

						</div>

						<button type="submit" class="btn btn-primary w-100">

							Login

						</button>

						<div class="text-center mt-3">

							<a href="#" data-bs-toggle="modal" data-bs-target="#forgotPasswordModal">

								Forgot Password?

							</a>

						</div>



					</form>

					<div class="text-center mt-3">

						<span class="text-muted">

							Don't have an account?

						</span>

						<a href="/register.html" class="text-decoration-none fw-bold">

							Create here

						</a>

					</div>



				</div>

			</div>

		</div>

	</div>

	<script>

		document.getElementById('loginForm')
			.addEventListener('submit', async function (e) {

				e.preventDefault();

				const loginRequest = {

					username:
						document.getElementById('username').value,

					password:
						document.getElementById('password').value
				};

				const response = await fetch('/auth/login', {

					method: 'POST',

					headers: {
						'Content-Type': 'application/json'
					},

					body: JSON.stringify(loginRequest)
				});

				const data = await response.json();
				if (!response.ok) {

					 alert(data.message);
					return;
				}

				// IMPORTANT CHANGE
				

				// Save token
				sessionStorage.setItem(
					'token',
					data.token
				);
				
				sessionStorage.setItem(
									'name',
									data.name
								);

				// Save username
				sessionStorage.setItem(
					'username',
					data.username
				);

				// Save profile image name
				sessionStorage.setItem(
					'profileImage',
					data.profileImage || ''
				);

				alert("Login successful");

				window.location.href = '/';
			});


		async function resetPassword() {

			const username =
				document.getElementById(
					'forgotUsername'
				).value;

			const newPassword =
				document.getElementById(
					'forgotPassword'
				).value;

			const confirmPassword =
				document.getElementById(
					'confirmForgotPassword'
				).value;



			// VALIDATION

			if (!username ||
				!newPassword ||
				!confirmPassword) {

				alert(
					"Please fill all fields"
				);

				return;
			}



			if (newPassword !== confirmPassword) {

				alert(
					"Passwords do not match"
				);

				return;
			}
			
				const response =
				    await fetch(
				        '/auth/forgot-password',
				        {

				            method: 'PUT',

				            headers: {

				                'Content-Type':
				                    'application/json'
				            },

				            body: JSON.stringify({

				                username: username,

				                newPassword: newPassword
				            })
				        });
				

			const message =
				await response.text();



			if (!response.ok) {

				alert(message);

				return;
			}



			alert(
				"Password reset successful"
			);



			// CLOSE MODAL

			const modalElement =
				document.getElementById(
					'forgotPasswordModal'
				);

			const modal =
				bootstrap.Modal.getInstance(
					modalElement
				);

			modal.hide();
			
			document.activeElement.blur();



			// CLEAR FIELDS

			document.getElementById(
				'forgotUsername'
			).value = '';

			document.getElementById(
				'forgotPassword'
			).value = '';

			document.getElementById(
				'confirmForgotPassword'
			).value = '';
		}



	</script>

	<!-- FORGOT PASSWORD MODAL -->

	<div class="modal fade" id="forgotPasswordModal" tabindex="-1">

		<div class="modal-dialog">

			<div class="modal-content">

				<div class="modal-header">

					<h5 class="modal-title">

						Forgot Password

					</h5>

					<button type="button" class="btn-close" data-bs-dismiss="modal">
					</button>

				</div>

				<div class="modal-body">

					<div class="mb-3">

						<label class="form-label">

							Username

						</label>

						<input type="text" id="forgotUsername" class="form-control">

					</div>

					<div class="mb-3">

						<label class="form-label">

							New Password

						</label>

						<input type="password" id="forgotPassword" class="form-control">

					</div>

					<div class="mb-3">

						<label class="form-label">

							Confirm Password

						</label>

						<input type="password" id="confirmForgotPassword" class="form-control">

					</div>

				</div>

				<div class="modal-footer">

					<button class="btn btn-secondary" data-bs-dismiss="modal">

						Close

					</button>

					<button class="btn btn-primary" onclick="resetPassword()">

						Reset Password

					</button>

				</div>

			</div>

		</div>

	</div>


	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>


</body>

</html>
